name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 后端构建与检查
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Maven 编译检查
        run: mvn -B clean compile
        working-directory: ./backend
      
      - name: 运行后端单元测试
        run: mvn test
        working-directory: ./backend

  # 前端构建与检查
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 安装依赖
        run: npm ci
        working-directory: ./frontend
      
      - name: 代码风格检查
        run: npm run lint
        working-directory: ./frontend
      
      - name: 项目构建检查
        run: npm run build
        working-directory: ./frontend